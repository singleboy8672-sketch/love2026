<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartLink • স্বপ্নের সঙ্গী</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@700&family=Inter:wght@400;500;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .heading { font-family: 'Playfair Display', serif; }
        .romantic { font-family: 'Dancing Script', cursive; }

        .love-border {
            position: relative;
            border: 12px solid transparent;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(90deg, #e11d48, #db2777, #c026d3, #e11d48) border-box;
            animation: borderRainbow 4s linear infinite;
        }

        @keyframes borderRainbow {
            0% { border-image-source: linear-gradient(90deg, #e11d48, #db2777); }
            50% { border-image-source: linear-gradient(90deg, #c026d3, #e11d48, #db2777); }
            100% { border-image-source: linear-gradient(90deg, #e11d48, #db2777); }
        }

        .rainbow-bg {
            background: linear-gradient(135deg, 
                #ff9a9e 0%, #fad0c4 20%, 
                #fad0c4 40%, #a1c4fd 60%, 
                #c2e9fb 80%, #ff9a9e 100%);
            animation: rainbowShift 8s linear infinite;
        }

        @keyframes rainbowShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="max-w-4xl mx-auto px-4 py-8">

        <!-- Step 1: Login - Rainbow -->
        <div id="step1" class="love-border rainbow-bg rounded-3xl shadow-2xl p-12 text-white">
            <h1 class="heading text-6xl text-center drop-shadow-lg">HeartLink</h1>
            <p class="romantic text-4xl text-center mt-3 drop-shadow">স্বপ্নের সঙ্গী তৈরি করুন</p>

            <div class="max-w-md mx-auto mt-12 space-y-6">
                <select id="language" onchange="changeLanguage()" class="w-full p-5 rounded-2xl text-lg border border-white/30 bg-white/20 text-white">
                    <option value="en">English</option>
                    <option value="bn">বাংলা</option>
                    <option value="hi">हिंदी</option>
                </select>

                <input id="userName" type="text" placeholder="আপনার নাম *" class="w-full p-5 rounded-2xl bg-white/90 text-gray-900">
                <input id="userEmail" type="email" placeholder="আপনার ইমেইল *" class="w-full p-5 rounded-2xl bg-white/90 text-gray-900">
                <input id="userAge" type="number" min="18" placeholder="আপনার বয়স *" class="w-full p-5 rounded-2xl bg-white/90 text-gray-900">

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="selectGender(this,'male')" class="gender-btn p-8 rounded-3xl bg-white/90 text-gray-900 text-xl">👨 পুরুষ</button>
                    <button onclick="selectGender(this,'female')" class="gender-btn p-8 rounded-3xl bg-white/90 text-gray-900 text-xl">👩 মহিলা</button>
                </div>

                <button id="next1" onclick="goToStep(2)" disabled class="w-full py-7 bg-white text-rose-600 text-2xl font-bold rounded-3xl">পরবর্তী →</button>
            </div>
        </div>

        <!-- Step 2: Physical - Deep Rose -->
        <div id="step2" class="love-border hidden bg-gradient-to-br from-rose-600 to-pink-700 text-white rounded-3xl shadow-2xl p-12">
            <h2 class="heading text-4xl text-center mb-10">শারীরিক বৈশিষ্ট্য</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label class="block mb-2 text-lg">সঙ্গীর বয়স</label>
                    <input id="pAge" type="number" class="w-full p-5 rounded-2xl bg-white/20 border border-white/30 text-white" placeholder="বয়স লিখুন">
                </div>
                <div>
                    <label class="block mb-2 text-lg">উচ্চতা</label>
                    <select id="height" class="w-full p-5 rounded-2xl bg-white/20 border border-white/30 text-white">
                        <option value="">নির্বাচন করুন</option>
                        <option value="খাটো">খাটো</option>
                        <option value="মাঝারি">মাঝারি</option>
                        <option value="লম্বা">লম্বা</option>
                    </select>
                </div>
                <div>
                    <label class="block mb-2 text-lg">শরীরের ধরন</label>
                    <select id="body" class="w-full p-5 rounded-2xl bg-white/20 border border-white/30 text-white">
                        <option value="">নির্বাচন করুন</option>
                        <option value="রোগা">রোগা / সরু</option>
                        <option value="মোটা">মোটা</option>
                        <option value="অ্যাথলেটিক">অ্যাথলেটিক</option>
                        <option value="কার্ভি">কার্ভি</option>
                    </select>
                </div>
                <div>
                    <label class="block mb-2 text-lg">গায়ের রং</label>
                    <select id="skin" class="w-full p-5 rounded-2xl bg-white/20 border border-white/30 text-white">
                        <option value="">নির্বাচন করুন</option>
                        <option value="ফর্সা">ফর্সা</option>
                        <option value="মাঝারি">মাঝারি</option>
                        <option value="কালো">কালো</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-between mt-12">
                <button onclick="goToStep(1)" class="px-10 py-4 bg-white/20 rounded-2xl">পিছনে</button>
                <button onclick="goToStep(3)" class="px-14 py-4 bg-white text-rose-600 font-bold rounded-2xl">পরবর্তী</button>
            </div>
        </div>

        <!-- Step 3: Face & Hair - Deep Purple -->
        <div id="step3" class="love-border hidden bg-gradient-to-br from-purple-700 to-violet-700 text-white rounded-3xl shadow-2xl p-12">
            <h2 class="heading text-4xl text-center mb-10">মুখমণ্ডল ও চুল</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label class="block mb-2 text-lg">চোখ</label>
                    <select id="eyes" class="w-full p-5 rounded-2xl bg-white/20 border border-white/30 text-white">
                        <option value="">নির্বাচন করুন</option>
                        <option value="বড় কালো">বড় কালো</option>
                        <option value="নীল">নীল</option>
                        <option value="সবুজ">সবুজ</option>
                    </select>
                </div>
                <div>
                    <label class="block mb-2 text-lg">ঠোঁট</label>
                    <select id="lips" class="w-full p-5 rounded-2xl bg-white/20 border border-white/30 text-white">
                        <option value="">নির্বাচন করুন</option>
                        <option value="মোটা">মোটা</option>
                        <option value="সুন্দর পাতলা">সুন্দর পাতলা</option>
                    </select>
                </div>
                <div>
                    <label class="block mb-2 text-lg">চুলের ধরন</label>
                    <select id="hair" class="w-full p-5 rounded-2xl bg-white/20 border border-white/30 text-white">
                        <option value="">নির্বাচন করুন</option>
                        <option value="লম্বা ঢেউ খেলানো">লম্বা ঢেউ খেলানো</option>
                        <option value="কোঁকড়া">কোঁকড়া</option>
                        <option value="সোজা">সোজা</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-between mt-12">
                <button onclick="goToStep(2)" class="px-10 py-4 bg-white/20 rounded-2xl">পিছনে</button>
                <button onclick="goToStep(4)" class="px-14 py-4 bg-white text-purple-700 font-bold rounded-2xl">পরবর্তী</button>
            </div>
        </div>

        <!-- Step 4: Mind & Submit - Deep Pink -->
        <div id="step4" class="love-border hidden bg-gradient-to-br from-pink-600 to-rose-600 text-white rounded-3xl shadow-2xl p-12">
            <h2 class="heading text-4xl text-center mb-10">মন ও আচরণ</h2>
            <textarea id="customNote" rows="6" class="w-full p-6 rounded-3xl bg-white/20 border border-white/30 text-white" placeholder="আর কোনো বিশেষ ইচ্ছা লিখুন..."></textarea>
            
            <button onclick="submitForm()" class="w-full mt-12 py-7 bg-white text-rose-600 text-2xl font-bold rounded-3xl">সাবমিট করুন & স্বপ্ন পূরণ করুন</button>
        </div>

        <!-- Result -->
        <div id="result" class="hidden bg-white rounded-3xl shadow-2xl p-12 text-center">
            <h2 class="heading text-5xl text-rose-600">আপনার স্বপ্নের সঙ্গী প্রস্তুত!</h2>
            <div id="summary" class="mt-10 text-left bg-pink-50 p-8 rounded-3xl"></div>
            <button onclick="downloadPDF()" class="mt-10 px-12 py-6 bg-gradient-to-r from-rose-500 to-purple-600 text-white rounded-3xl text-xl">PDF ডাউনলোড করুন</button>
        </div>
    </div>

    <script>
        let userGender = "";

        function selectGender(btn, gender) {
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('ring-4', 'ring-white'));
            btn.classList.add('ring-4', 'ring-white');
            userGender = gender;
            validateStep1();
        }

        function validateStep1() {
            const valid = document.getElementById('userName').value && 
                          document.getElementById('userEmail').value && 
                          document.getElementById('userAge').value && userGender;
            document.getElementById('next1').disabled = !valid;
        }

        function goToStep(step) {
            document.querySelectorAll('#step1,#step2,#step3,#step4,#result').forEach(el => el.classList.add('hidden'));
            document.getElementById('step' + step).classList.remove('hidden');
        }

        function submitForm() {
            document.getElementById('step4').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            
            document.getElementById('summary').innerHTML = `
                <p class="text-2xl font-semibold">নাম: ${document.getElementById('userName').value}</p>
                <p>শরীর: ${document.getElementById('body').value || 'নির্বাচিত হয়নি'}</p>
                <p>চুল: ${document.getElementById('hair').value || 'নির্বাচিত হয়নি'}</p>
                <p class="mt-6">ঠিকানা: ১৪২ ভালোবাসা লেন, হার্টভিল</p>
            `;
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("স্বপ্নের সঙ্গী", 20, 30);
            doc.save("স্বপ্নের_সঙ্গী.pdf");
        }

        window.onload = () => goToStep(1);
    </script>
</body>
</html>
