<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartLink • Dream Partner Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@700&family=Inter:wght@400;500;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .heading { font-family: 'Playfair Display', serif; }
        .romantic { font-family: 'Dancing Script', cursive; }

        .rainbow-border {
            border: 24px solid transparent; /* আরও মোটা */
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(90deg, 
                            #ff0000, #ff3300, #ff9900, #ffee00, 
                            #aaff00, #00ff33, #00ff99, #00ccff, 
                            #0066ff, #3300ff, #9900ff, #ff00cc) border-box;
            animation: rainbowGlow 0.5s linear infinite; /* খুব দ্রুত */
        }

        @keyframes rainbowGlow {
            0%   { border-image-source: linear-gradient(90deg, #ff0000, #ff3300, #ff9900); }
            10%  { border-image-source: linear-gradient(90deg, #ffee00, #aaff00, #00ff33); }
            20%  { border-image-source: linear-gradient(90deg, #00ff99, #00ccff, #0066ff); }
            30%  { border-image-source: linear-gradient(90deg, #3300ff, #9900ff, #ff00cc); }
            40%  { border-image-source: linear-gradient(90deg, #ff0000, #ff3300, #ff9900); }
            50%  { border-image-source: linear-gradient(90deg, #ffee00, #aaff00, #00ff33); }
            60%  { border-image-source: linear-gradient(90deg, #00ff99, #00ccff, #0066ff); }
            70%  { border-image-source: linear-gradient(90deg, #3300ff, #9900ff, #ff00cc); }
            80%  { border-image-source: linear-gradient(90deg, #ff0000, #ff3300, #ff9900); }
            90%  { border-image-source: linear-gradient(90deg, #ffee00, #aaff00, #00ff33); }
            100% { border-image-source: linear-gradient(90deg, #00ff99, #00ccff, #0066ff); }
        }

        .rainbow-content {
            background: linear-gradient(135deg, 
                #ff0000, #ff5500, #ffee00, #aaff00, 
                #00ff55, #00ffcc, #00aaff, #4400ff, 
                #aa00ff, #ff00aa);
            background-size: 600% 600%;
            animation: rainbowShift 2s linear infinite;
        }

        @keyframes rainbowShift {
            0%   { background-position: 0% 50%; }
            25%  { background-position: 100% 0%; }
            50%  { background-position: 100% 100%; }
            75%  { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 to-purple-50">

<div class="max-w-4xl mx-auto px-4 py-8">

    <!-- Step 1: Login -->
    <div id="step1" class="rainbow-border rainbow-content rounded-3xl shadow-2xl p-12 text-white">
        <h1 class="heading text-6xl text-center drop-shadow-lg">HeartLink</h1>
        <p class="romantic text-4xl text-center mt-4 drop-shadow">Create Your Dream Partner</p>

        <div class="max-w-lg mx-auto mt-12 space-y-6">
            <select id="language" class="w-full p-4 rounded-2xl bg-white/30 border border-white/50 text-white">
                <option value="en" selected>English</option>
                <option value="bn">বাংলা</option>
                <option value="hi">हिंदी</option>
            </select>

            <input id="userName" type="text" placeholder="Your Full Name *" onkeyup="validateStep1()" class="w-full p-5 rounded-2xl bg-white/90 text-gray-900">
            <input id="userEmail" type="email" placeholder="Your Email *" onkeyup="validateStep1()" class="w-full p-5 rounded-2xl bg-white/90 text-gray-900">
            <input id="userAge" type="number" min="18" placeholder="Your Age *" onkeyup="validateStep1()" class="w-full p-5 rounded-2xl bg-white/90 text-gray-900">

            <select id="userGender" onchange="validateStep1()" class="w-full p-5 rounded-2xl bg-white/90 text-gray-900">
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>

            <button id="next1" onclick="goToStep(2)" disabled class="w-full py-7 bg-white text-rose-600 text-2xl font-bold rounded-3xl">Continue</button>
        </div>
    </div>

    <!-- Step 2 -->
    <div id="step2" class="love-border hidden bg-gradient-to-br from-rose-700 to-pink-700 text-white rounded-3xl shadow-2xl p-12">
        <h2 class="heading text-4xl text-center mb-10">Physical Attributes</h2>
        <div class="grid md:grid-cols-2 gap-8">
            <div><label>Partner Age</label><input id="pAge" type="number" min="18" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white"></div>
            <div>
                <label>Height</label>
                <select id="height" onchange="toggleCustom(this)" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
                    <option value="">Select</option>
                    <option value="Petite">Petite</option>
                    <option value="Average">Average</option>
                    <option value="Tall">Tall</option>
                    <option value="custom">Custom</option>
                </select>
                <input id="heightCustom" type="text" placeholder="Describe height" class="hidden w-full mt-3 p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
            </div>
            <div>
                <label>Body Type</label>
                <select id="body" onchange="toggleCustom(this)" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
                    <option value="">Select</option>
                    <option value="Slim">Slim</option>
                    <option value="Athletic">Athletic</option>
                    <option value="Curvy">Curvy</option>
                    <option value="Thick">Thick</option>
                    <option value="custom">Custom</option>
                </select>
                <input id="bodyCustom" type="text" placeholder="Describe body" class="hidden w-full mt-3 p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
            </div>
            <div>
                <label>Skin Tone</label>
                <select id="skin" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
                    <option value="">Select</option>
                    <option value="Fair">Fair</option>
                    <option value="Medium">Medium</option>
                    <option value="Deep">Deep</option>
                </select>
            </div>
        </div>
        <div class="flex justify-between mt-12">
            <button onclick="goToStep(1)" class="px-10 py-4 bg-white/30 rounded-2xl">Back</button>
            <button onclick="goToStep(3)" class="px-14 py-4 bg-white text-rose-700 font-bold rounded-2xl">Next</button>
        </div>
    </div>

    <!-- Step 3 -->
    <div id="step3" class="love-border hidden bg-gradient-to-br from-purple-700 to-violet-700 text-white rounded-3xl shadow-2xl p-12">
        <h2 class="heading text-4xl text-center mb-10">Face & Hair</h2>
        <div class="grid md:grid-cols-2 gap-8">
            <div>
                <label>Face Shape</label>
                <select id="faceShape" onchange="toggleCustom(this)" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
                    <option value="">Select</option>
                    <option value="Oval">Oval</option>
                    <option value="Heart">Heart</option>
                    <option value="Round">Round</option>
                    <option value="custom">Custom</option>
                </select>
                <input id="faceShapeCustom" type="text" placeholder="Describe" class="hidden w-full mt-3 p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
            </div>
            <div>
                <label>Eyes</label>
                <select id="eyes" onchange="toggleCustom(this)" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
                    <option value="">Select</option>
                    <option value="Big Brown">Big Brown</option>
                    <option value="Blue">Blue</option>
                    <option value="Green">Green</option>
                    <option value="custom">Custom</option>
                </select>
                <input id="eyesCustom" type="text" placeholder="Describe eyes" class="hidden w-full mt-3 p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
            </div>
            <div>
                <label>Lips</label>
                <select id="lips" onchange="toggleCustom(this)" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
                    <option value="">Select</option>
                    <option value="Full Plump">Full & Plump</option>
                    <option value="Soft">Soft Natural</option>
                    <option value="custom">Custom</option>
                </select>
                <input id="lipsCustom" type="text" placeholder="Describe lips" class="hidden w-full mt-3 p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
            </div>
            <div>
                <label>Hair Style</label>
                <select id="hair" onchange="toggleCustom(this)" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
                    <option value="">Select</option>
                    <option value="Long Wavy">Long Wavy</option>
                    <option value="Curly">Curly</option>
                    <option value="Straight">Straight</option>
                    <option value="custom">Custom</option>
                </select>
                <input id="hairCustom" type="text" placeholder="Describe hair" class="hidden w-full mt-3 p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
            </div>
        </div>
        <div class="flex justify-between mt-12">
            <button onclick="goToStep(2)" class="px-10 py-4 bg-white/30 rounded-2xl">Back</button>
            <button onclick="goToStep(4)" class="px-14 py-4 bg-white text-purple-700 font-bold rounded-2xl">Next</button>
        </div>
    </div>

    <!-- Step 4 -->
    <div id="step4" class="love-border hidden bg-gradient-to-br from-pink-600 to-rose-600 text-white rounded-3xl shadow-2xl p-12">
        <h2 class="heading text-4xl text-center mb-10">Personality & Intimacy</h2>
        <div class="space-y-8">
            <div>
                <label>Mindset</label>
                <select id="mindset" onchange="toggleCustom(this)" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
                    <option value="">Select</option>
                    <option value="Highly Understanding">Highly Understanding</option>
                    <option value="Romantic">Romantic</option>
                    <option value="Adventurous">Adventurous</option>
                    <option value="custom">Custom</option>
                </select>
                <input id="mindsetCustom" type="text" placeholder="Describe" class="hidden w-full mt-3 p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
            </div>
            <div>
                <label>Intimacy Style</label>
                <select id="intimacy" onchange="toggleCustom(this)" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
                    <option value="">Select</option>
                    <option value="Affectionate">Affectionate</option>
                    <option value="Passionate">Passionate</option>
                    <option value="Gentle">Gentle</option>
                    <option value="Wild">Wild</option>
                    <option value="custom">Custom</option>
                </select>
                <input id="intimacyCustom" type="text" placeholder="Describe" class="hidden w-full mt-3 p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
            </div>
            <textarea id="customNote" rows="5" class="w-full p-6 rounded-3xl bg-white/20 border border-white/40 text-white" placeholder="Any other wishes..."></textarea>
        </div>
        <button onclick="submitForm()" class="w-full mt-12 py-7 bg-white text-rose-600 text-2xl font-bold rounded-3xl">Manifest My Partner</button>
    </div>

    <!-- Result -->
    <div id="result" class="hidden bg-white rounded-3xl shadow-2xl p-12 text-center">
        <h2 class="heading text-5xl text-rose-600">Your Dream Partner is Ready!</h2>
        <div id="summary" class="mt-10 bg-pink-50 p-8 rounded-3xl text-left"></div>
        <button onclick="downloadPDF()" class="mt-10 px-12 py-6 bg-gradient-to-r from-rose-500 to-purple-600 text-white rounded-3xl">Download PDF</button>
    </div>
</div>

<script>
    function validateStep1() {
        const name = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        const age = document.getElementById('userAge').value;
        const gender = document.getElementById('userGender').value;
        document.getElementById('next1').disabled = !(name && email && age && gender);
    }

    function toggleCustom(select) {
        const customId = select.id + 'Custom';
        const field = document.getElementById(customId);
        if (field) field.classList.toggle('hidden', select.value !== 'custom');
    }

    function goToStep(step) {
        document.querySelectorAll('#step1,#step2,#step3,#step4,#result').forEach(el => el.classList.add('hidden'));
        document.getElementById('step' + step).classList.remove('hidden');
    }

    function submitForm() {
        document.getElementById('step4').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        document.getElementById('summary').innerHTML = `
            <h3 class="text-2xl font-bold mb-6">Your Dream Partner Summary</h3>
            <p><strong>Name:</strong> ${document.getElementById('userName').value}</p>
            <p><strong>Partner Age:</strong> ${document.getElementById('pAge').value || 'Not specified'}</p>
            <p><strong>Body:</strong> ${document.getElementById('body').value || 'Not specified'}</p>
            <p><strong>Eyes:</strong> ${document.getElementById('eyes').value || 'Not specified'}</p>
            <p><strong>Hair:</strong> ${document.getElementById('hair').value || 'Not specified'}</p>
        `;
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Dream Partner Profile", 20, 30);
        doc.save("Dream_Partner.pdf");
    }

    window.onload = () => {
        document.getElementById('next1').disabled = true;
    };
</script>
</body>
</html>
