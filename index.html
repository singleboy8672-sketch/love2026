<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartLink • Dream Partner Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@700&family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #fdf2f8, #f3e8ff); }
        .heading { font-family: 'Playfair Display', serif; }
        .romantic { font-family: 'Dancing Script', cursive; }
    </style>
</head>
<body class="min-h-screen relative">

    <div class="max-w-5xl mx-auto px-4 py-8">
        <div class="text-center mb-10">
            <h1 class="heading text-6xl text-transparent bg-clip-text bg-gradient-to-r from-rose-600 to-pink-600">HeartLink</h1>
            <p class="romantic text-3xl text-rose-500">Build Your Dream Partner</p>
        </div>

        <!-- Step 1: Login -->
        <div id="step1" class="bg-white rounded-3xl shadow-2xl p-10">
            <h2 class="heading text-3xl text-center mb-8">Let's Start Your Journey</h2>
            <div class="max-w-lg mx-auto grid grid-cols-1 gap-6">
                <select id="language" class="p-4 border-2 border-pink-200 rounded-2xl">
                    <option value="en">English</option>
                    <option value="bn">বাংলা</option>
                    <option value="hi">हिंदी</option>
                </select>

                <input id="userName" type="text" placeholder="Your Full Name *" class="p-4 border-2 border-pink-200 rounded-2xl" onkeyup="validateStep1()">
                <input id="userEmail" type="email" placeholder="Your Email *" class="p-4 border-2 border-pink-200 rounded-2xl" onkeyup="validateStep1()">
                <input id="userAge" type="number" placeholder="Your Age *" min="18" class="p-4 border-2 border-pink-200 rounded-2xl" onkeyup="validateStep1()">

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="selectGender(this, 'male')" class="gender-btn p-6 border-2 rounded-3xl text-lg">👨 Male</button>
                    <button onclick="selectGender(this, 'female')" class="gender-btn p-6 border-2 rounded-3xl text-lg">👩 Female</button>
                </div>

                <button id="continueBtn" onclick="goToStep(2)" disabled class="w-full py-6 bg-gradient-to-r from-rose-500 to-pink-600 text-white text-xl font-semibold rounded-3xl">Continue</button>
            </div>
        </div>

        <!-- Step 2: Customization -->
        <div id="step2" class="hidden bg-white rounded-3xl shadow-2xl">
            <div class="flex border-b text-center">
                <button onclick="switchTab(0)" id="tab0" class="tab-btn flex-1 py-5 font-medium active">Physical</button>
                <button onclick="switchTab(1)" id="tab1" class="tab-btn flex-1 py-5 font-medium">Face & Hair</button>
                <button onclick="switchTab(2)" id="tab2" class="tab-btn flex-1 py-5 font-medium">Mind & Love</button>
            </div>

            <!-- Physical Tab -->
            <div id="content0" class="p-10 grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label class="block mb-2 font-medium">Partner Age</label>
                    <input id="partnerAge" type="number" value="26" class="w-full p-4 border-2 border-pink-200 rounded-2xl">
                </div>
                <div>
                    <label class="block mb-2 font-medium">Height</label>
                    <select id="height" onchange="toggleCustom(this)" class="w-full p-4 border-2 border-pink-200 rounded-2xl">
                        <option value="">Select Height</option>
                        <option value="Petite">Petite (Short)</option>
                        <option value="Average">Average</option>
                        <option value="Tall">Tall</option>
                        <option value="Very Tall">Very Tall</option>
                        <option value="custom">Custom</option>
                    </select>
                    <input id="heightCustom" type="text" placeholder="Write your preference" class="hidden w-full mt-3 p-4 border border-pink-300 rounded-2xl">
                </div>
                <div>
                    <label class="block mb-2 font-medium">Body Type</label>
                    <select id="bodyType" onchange="toggleCustom(this)" class="w-full p-4 border-2 border-pink-200 rounded-2xl">
                        <option value="">Select Body</option>
                        <option value="Slim / Skinny">Slim / Skinny (রোগা)</option>
                        <option value="Athletic">Athletic</option>
                        <option value="Curvy">Curvy</option>
                        <option value="Voluptuous / Thick">Voluptuous / Thick (মোটা)</option>
                        <option value="Chubby">Chubby</option>
                        <option value="custom">Custom</option>
                    </select>
                    <input id="bodyCustom" type="text" placeholder="Describe body type" class="hidden w-full mt-3 p-4 border border-pink-300 rounded-2xl">
                </div>
                <div>
                    <label class="block mb-2 font-medium">Skin Tone</label>
                    <select id="skinTone" class="w-full p-4 border-2 border-pink-200 rounded-2xl">
                        <option>Fair</option><option>Light</option><option>Medium</option><option>Olive</option><option>Deep</option>
                    </select>
                </div>
            </div>

            <!-- Face & Hair Tab -->
            <div id="content1" class="p-10 hidden grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label>Face Shape</label>
                    <select id="faceShape" onchange="toggleCustom(this)" class="w-full p-4 border-2 border-pink-200 rounded-2xl">
                        <option value="">Select</option>
                        <option value="Oval">Oval</option>
                        <option value="Heart">Heart</option>
                        <option value="Round">Round</option>
                        <option value="Square">Square</option>
                        <option value="custom">Custom</option>
                    </select>
                    <input id="faceCustom" type="text" placeholder="Your choice" class="hidden w-full mt-3 p-4 border border-pink-300 rounded-2xl">
                </div>
                <div>
                    <label>Eyes</label>
                    <select id="eyes" onchange="toggleCustom(this)" class="w-full p-4 border-2 border-pink-200 rounded-2xl">
                        <option value="">Select</option>
                        <option value="Big Brown">Big Brown</option>
                        <option value="Blue">Blue</option>
                        <option value="Green">Green</option>
                        <option value="custom">Custom</option>
                    </select>
                    <input id="eyesCustom" type="text" placeholder="Your choice" class="hidden w-full mt-3 p-4 border border-pink-300 rounded-2xl">
                </div>
                <div>
                    <label>Nose</label>
                    <select id="nose" onchange="toggleCustom(this)" class="w-full p-4 border-2 border-pink-200 rounded-2xl">
                        <option value="">Select</option>
                        <option value="Straight">Straight</option>
                        <option value="Button">Button</option>
                        <option value="custom">Custom</option>
                    </select>
                    <input id="noseCustom" type="text" placeholder="Your choice" class="hidden w-full mt-3 p-4 border border-pink-300 rounded-2xl">
                </div>
                <div>
                    <label>Lips</label>
                    <select id="lips" onchange="toggleCustom(this)" class="w-full p-4 border-2 border-pink-200 rounded-2xl">
                        <option value="">Select</option>
                        <option value="Full Plump">Full & Plump</option>
                        <option value="Soft">Soft & Natural</option>
                        <option value="custom">Custom</option>
                    </select>
                    <input id="lipsCustom" type="text" placeholder="Your choice" class="hidden w-full mt-3 p-4 border border-pink-300 rounded-2xl">
                </div>
                <div>
                    <label>Hair Style</label>
                    <select id="hairStyle" onchange="toggleCustom(this)" class="w-full p-4 border-2 border-pink-200 rounded-2xl">
                        <option value="">Select Hair</option>
                        <option value="Long Wavy">Long Wavy</option>
                        <option value="Short Curly">Short Curly</option>
                        <option value="Straight Silky">Straight Silky</option>
                        <option value="Braided">Braided</option>
                        <option value="Pixie Cut">Pixie Cut</option>
                        <option value="custom">Custom</option>
                    </select>
                    <input id="hairCustom" type="text" placeholder="Your hair preference" class="hidden w-full mt-3 p-4 border border-pink-300 rounded-2xl">
                </div>
            </div>

            <!-- Mind & Intimacy Tab -->
            <div id="content2" class="p-10 hidden space-y-8">
                <div>
                    <label>Mindset</label>
                    <select id="mindset" onchange="toggleCustom(this)" class="w-full p-4 border-2 border-pink-200 rounded-2xl">
                        <option value="">Select</option>
                        <option value="Highly Understanding">Highly Understanding</option>
                        <option value="Romantic & Loyal">Romantic & Loyal</option>
                        <option value="custom">Custom</option>
                    </select>
                    <input id="mindsetCustom" type="text" placeholder="Describe mindset" class="hidden w-full mt-3 p-4 border border-pink-300 rounded-2xl">
                </div>
                <div>
                    <label>Romantic Style</label>
                    <select id="romantic" onchange="toggleCustom(this)" class="w-full p-4 border-2 border-pink-200 rounded-2xl">
                        <option value="">Select</option>
                        <option value="Very Romantic">Very Romantic</option>
                        <option value="Passionate">Passionate</option>
                        <option value="custom">Custom</option>
                    </select>
                    <input id="romanticCustom" type="text" placeholder="Describe" class="hidden w-full mt-3 p-4 border border-pink-300 rounded-2xl">
                </div>
                <div>
                    <label>Intimacy Style</label>
                    <select id="intimacy" onchange="toggleCustom(this)" class="w-full p-4 border-2 border-pink-200 rounded-2xl">
                        <option value="">Select</option>
                        <option value="Affectionate">Affectionate & Sensual</option>
                        <option value="Wild">Wild & Passionate</option>
                        <option value="Gentle">Gentle & Romantic</option>
                        <option value="custom">Custom</option>
                    </select>
                    <input id="intimacyCustom" type="text" placeholder="Describe intimacy" class="hidden w-full mt-3 p-4 border border-pink-300 rounded-2xl">
                </div>
                <textarea id="customNote" rows="4" class="w-full p-5 border-2 border-pink-200 rounded-3xl" placeholder="Any other special requests..."></textarea>
            </div>

            <div class="p-8 border-t flex justify-between">
                <button onclick="goToStep(1)" class="px-8 py-4">← Back</button>
                <button onclick="submitDream()" class="px-12 py-5 bg-gradient-to-r from-rose-500 to-pink-600 text-white rounded-3xl font-semibold">Manifest My Partner</button>
            </div>
        </div>

        <!-- Result -->
        <div id="step3" class="hidden bg-white rounded-3xl shadow-2xl p-12 text-center">
            <h2 class="heading text-5xl text-rose-600 mb-6">Your Dream Partner is Ready! 💖</h2>
            <div id="summary" class="max-w-lg mx-auto bg-pink-50 p-8 rounded-3xl text-left"></div>
            <button onclick="downloadPDF()" class="mt-10 px-10 py-5 bg-gradient-to-r from-rose-500 to-pink-600 text-white rounded-3xl">Download PDF</button>
        </div>
    </div>

    <script>
        let userGender = "";

        function selectGender(btn, gender) {
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('border-rose-500'));
            btn.classList.add('border-rose-500');
            userGender = gender;
            validateStep1();
        }

        function validateStep1() {
            const name = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const age = document.getElementById('userAge').value;
            document.getElementById('continueBtn').disabled = !(name && email && age && userGender);
        }

        function goToStep(step) {
            document.querySelectorAll('#step1,#step2,#step3').forEach(el => el.classList.add('hidden'));
            document.getElementById('step' + step).classList.remove('hidden');
        }

        function switchTab(n) {
            document.querySelectorAll('#content0,#content1,#content2').forEach(el => el.classList.add('hidden'));
            document.getElementById('content' + n).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
        }

        function toggleCustom(select) {
            const id = select.id + 'Custom';
            const field = document.getElementById(id);
            if (field) field.classList.toggle('hidden', select.value !== 'custom');
        }

        function submitDream() {
            goToStep(3);
            const partnerType = userGender === 'male' ? 'Girlfriend' : 'Boyfriend';
            document.getElementById('summary').innerHTML = `
                <h3 class="text-2xl font-bold mb-6">Your Perfect ${partnerType}</h3>
                <p><strong>Body Type:</strong> ${document.getElementById('bodyType').value === 'custom' ? document.getElementById('bodyCustom').value : document.getElementById('bodyType').value}</p>
                <p><strong>Height:</strong> ${document.getElementById('height').value === 'custom' ? document.getElementById('heightCustom').value : document.getElementById('height').value}</p>
                <p><strong>Hair:</strong> ${document.getElementById('hairStyle').value === 'custom' ? document.getElementById('hairCustom').value : document.getElementById('hairStyle').value}</p>
                <p><strong>Intimacy:</strong> ${document.getElementById('intimacy').value === 'custom' ? document.getElementById('intimacyCustom').value : document.getElementById('intimacy').value}</p>
            `;
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Dream Partner Profile", 20, 30);
            doc.save("Dream_Partner.pdf");
        }

        window.onload = () => {
            goToStep(1);
            switchTab(0);
        };
    </script>
</body>
</html>
