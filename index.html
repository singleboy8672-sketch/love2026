<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartLink • Dream Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@700&family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .heading { font-family: 'Playfair Display', serif; }
        .romantic { font-family: 'Dancing Script', cursive; }
        .love-border {
            border: 8px solid transparent;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(45deg, #e11d48, #c026d3, #db2777) border-box;
            animation: borderGlow 3s linear infinite;
        }
        @keyframes borderGlow { 0%,100% { border-color: #e11d48; } 50% { border-color: #c026d3; } }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 via-purple-50 to-rose-50">

<div class="max-w-4xl mx-auto px-4 py-8">

    <!-- Step 1 -->
    <div id="step1" class="love-border bg-white rounded-3xl shadow-2xl p-10">
        <h1 class="heading text-5xl text-center bg-gradient-to-r from-rose-500 to-purple-600 bg-clip-text text-transparent" id="title">HeartLink</h1>
        <p class="romantic text-center text-3xl mt-2" id="subtitle">Create Your Dream Partner</p>

        <div class="max-w-md mx-auto mt-10 space-y-6">
            <select id="language" onchange="changeLanguage()" class="w-full p-4 border-2 border-pink-300 rounded-2xl text-lg">
                <option value="en">English</option>
                <option value="bn">বাংলা</option>
                <option value="hi">हिंदी</option>
            </select>

            <input id="userName" type="text" class="w-full p-5 border-2 border-pink-200 rounded-2xl" placeholder="Your Name *">
            <input id="userEmail" type="email" class="w-full p-5 border-2 border-pink-200 rounded-2xl" placeholder="Your Email *">
            <input id="userAge" type="number" min="18" class="w-full p-5 border-2 border-pink-200 rounded-2xl" placeholder="Your Age *">

            <div class="grid grid-cols-2 gap-4">
                <button onclick="selectGender(this,'male')" class="gender-btn p-6 border-2 rounded-3xl text-xl">👨 Male</button>
                <button onclick="selectGender(this,'female')" class="gender-btn p-6 border-2 rounded-3xl text-xl">👩 Female</button>
            </div>

            <button id="nextBtn" onclick="goToStep(2)" disabled class="w-full py-6 bg-gradient-to-r from-rose-500 to-purple-600 text-white text-xl rounded-3xl font-semibold">Continue</button>
        </div>
    </div>

    <!-- Other steps (Physical, Face, Mind) -->
    <div id="step2" class="love-border hidden bg-white rounded-3xl shadow-2xl p-10">
        <h2 class="heading text-4xl text-center mb-8" id="step2title">Physical Attributes</h2>
        <!-- Add your fields here with ids for translation -->
        <div class="flex justify-between mt-10">
            <button onclick="goToStep(1)" class="px-8 py-4">Back</button>
            <button onclick="goToStep(3)" class="px-12 py-4 bg-gradient-to-r from-rose-500 to-purple-600 text-white rounded-3xl">Next</button>
        </div>
    </div>

    <div id="step3" class="love-border hidden bg-white rounded-3xl shadow-2xl p-10">
        <h2 class="heading text-4xl text-center mb-8" id="step3title">Face & Hair</h2>
        <div class="flex justify-between mt-10">
            <button onclick="goToStep(2)" class="px-8 py-4">Back</button>
            <button onclick="goToStep(4)" class="px-12 py-4 bg-gradient-to-r from-rose-500 to-purple-600 text-white rounded-3xl">Next</button>
        </div>
    </div>

    <div id="step4" class="love-border hidden bg-white rounded-3xl shadow-2xl p-10">
        <h2 class="heading text-4xl text-center mb-8" id="step4title">Mind & Love</h2>
        <button onclick="submitForm()" class="w-full py-6 bg-gradient-to-r from-rose-500 to-purple-600 text-white text-xl rounded-3xl">Submit</button>
    </div>

    <!-- Result -->
    <div id="result" class="hidden bg-white rounded-3xl shadow-2xl p-12 text-center">
        <h2 class="heading text-5xl text-rose-600" id="resultTitle">Your Dream Partner is Ready!</h2>
        <div id="summary" class="mt-8"></div>
        <button onclick="downloadPDF()" class="mt-10 px-10 py-5 bg-gradient-to-r from-rose-500 to-purple-600 text-white rounded-3xl">Download PDF</button>
    </div>
</div>

<script>
    const translations = {
        en: {
            title: "HeartLink",
            subtitle: "Create Your Dream Partner",
            step2title: "Physical Attributes",
            step3title: "Face & Hair",
            step4title: "Mind & Love",
            resultTitle: "Your Dream Partner is Ready!"
        },
        bn: {
            title: "হার্টলিঙ্ক",
            subtitle: "স্বপ্নের সঙ্গী তৈরি করুন",
            step2title: "শারীরিক বৈশিষ্ট্য",
            step3title: "মুখ ও চুল",
            step4title: "মন ও ভালোবাসা",
            resultTitle: "আপনার স্বপ্নের সঙ্গী প্রস্তুত!"
        },
        hi: {
            title: "हार्टलिंक",
            subtitle: "अपना सपनों का साथी बनाएं",
            step2title: "शारीरिक विशेषताएं",
            step3title: "चेहरा और बाल",
            step4title: "मन और प्यार",
            resultTitle: "आपका सपनों का साथी तैयार है!"
        }
    };

    let currentLang = "en";
    let userGender = "";

    function changeLanguage() {
        currentLang = document.getElementById('language').value;
        const t = translations[currentLang];
        
        document.getElementById('title').textContent = t.title;
        document.getElementById('subtitle').textContent = t.subtitle;
        document.getElementById('step2title').textContent = t.step2title;
        document.getElementById('step3title').textContent = t.step3title;
        document.getElementById('step4title').textContent = t.step4title;
        document.getElementById('resultTitle').textContent = t.resultTitle;
    }

    function selectGender(btn, gender) {
        document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('border-rose-500'));
        btn.classList.add('border-rose-500');
        userGender = gender;
        validateStep1();
    }

    function validateStep1() {
        const valid = document.getElementById('userName').value && 
                      document.getElementById('userEmail').value && 
                      document.getElementById('userAge').value && userGender;
        document.getElementById('nextBtn').disabled = !valid;
    }

    function goToStep(step) {
        document.querySelectorAll('#step1,#step2,#step3,#step4,#result').forEach(el => el.classList.add('hidden'));
        document.getElementById('step' + step).classList.remove('hidden');
    }

    function submitForm() {
        goToStep('result'); // Using string for result
        document.getElementById('summary').innerHTML = `<p class="text-xl">Thank you! Your partner has been created with love 💕</p>`;
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Dream Partner", 20, 30);
        doc.save("Dream_Partner.pdf");
    }

    window.onload = () => {
        goToStep(1);
    };
</script>
</body>
</html>
