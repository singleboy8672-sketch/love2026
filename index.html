<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartLink • Dream Partner Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@700&family=Inter:wght@400;500;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .heading { font-family: 'Playfair Display', serif; }
        .romantic { font-family: 'Dancing Script', cursive; }

        .love-border {
            border: 14px solid transparent;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(45deg, #e11d48, #c026d3, #db2777) border-box;
            animation: borderGlow 3s linear infinite;
        }
        @keyframes borderGlow {
            0%,100% { border-color: #e11d48; }
            50% { border-color: #c026d3; }
        }
        .rainbow-login {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a1c4fd, #c2e9fb, #ff9a9e);
            background-size: 400% 400%;
            animation: rainbow 8s ease infinite;
        }
        @keyframes rainbow { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }
    </style>
</head>
<body class="min-h-screen">

<div class="max-w-4xl mx-auto px-4 py-8">

    <!-- Step 1 -->
    <div id="step1" class="love-border rainbow-login rounded-3xl shadow-2xl p-12 text-white">
        <h1 class="heading text-6xl text-center">HeartLink</h1>
        <p class="romantic text-4xl text-center mt-4">Create Your Dream Partner</p>

        <div class="max-w-lg mx-auto mt-12 space-y-6">
            <div>
                <label class="block text-sm mb-1">Preferred Language</label>
                <select id="language" class="w-full p-4 rounded-2xl bg-white/30 border border-white/50">
                    <option value="en" selected>English</option>
                    <option value="bn">বাংলা</option>
                    <option value="hi">हिंदी</option>
                </select>
            </div>

            <div>
                <label class="block text-sm mb-1">Your Full Name <span class="text-red-300">*</span></label>
                <input id="userName" type="text" class="w-full p-5 rounded-2xl bg-white/90 text-gray-900" placeholder="Enter your name">
            </div>

            <div>
                <label class="block text-sm mb-1">Your Email <span class="text-red-300">*</span></label>
                <input id="userEmail" type="email" class="w-full p-5 rounded-2xl bg-white/90 text-gray-900" placeholder="you@example.com">
            </div>

            <div>
                <label class="block text-sm mb-1">Your Age <span class="text-red-300">*</span></label>
                <input id="userAge" type="number" min="18" class="w-full p-5 rounded-2xl bg-white/90 text-gray-900" placeholder="Your age">
            </div>

            <div>
                <label class="block text-sm mb-2">Your Gender <span class="text-red-300">*</span></label>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="selectGender(this,'male')" class="gender-btn p-8 rounded-3xl bg-white/90 text-gray-900 text-xl">👨 Male</button>
                    <button onclick="selectGender(this,'female')" class="gender-btn p-8 rounded-3xl bg-white/90 text-gray-900 text-xl">👩 Female</button>
                </div>
            </div>

            <button id="next1" onclick="validateAndGo(1,2)" class="w-full py-7 bg-white text-rose-600 text-2xl font-bold rounded-3xl">Continue</button>
        </div>
    </div>

    <!-- Step 2: Physical -->
    <div id="step2" class="love-border hidden bg-gradient-to-br from-rose-700 to-pink-700 text-white rounded-3xl shadow-2xl p-12">
        <h2 class="heading text-4xl text-center mb-10">Physical Attributes</h2>
        <div class="grid md:grid-cols-2 gap-8">
            <div>
                <label class="block mb-2">Partner Age <span class="text-red-300">*</span></label>
                <input id="pAge" type="number" min="18" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
            </div>
            <div>
                <label class="block mb-2">Height <span class="text-red-300">*</span></label>
                <select id="height" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
                    <option value="">Select Height</option>
                    <option value="Short">Short</option>
                    <option value="Average">Average</option>
                    <option value="Tall">Tall</option>
                </select>
            </div>
            <div>
                <label class="block mb-2">Body Type <span class="text-red-300">*</span></label>
                <select id="body" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
                    <option value="">Select Body Type</option>
                    <option value="Slim">Slim</option>
                    <option value="Curvy">Curvy</option>
                    <option value="Athletic">Athletic</option>
                    <option value="Thick">Thick</option>
                </select>
            </div>
        </div>
        <div class="flex justify-between mt-12">
            <button onclick="goToStep(1)" class="px-10 py-4 bg-white/30 rounded-2xl">Back</button>
            <button onclick="validateAndGo(2,3)" class="px-14 py-4 bg-white text-rose-700 font-bold rounded-2xl">Next</button>
        </div>
    </div>

    <!-- Step 3 & 4 similar with validation -->
    <div id="step3" class="love-border hidden bg-gradient-to-br from-purple-700 to-violet-700 text-white rounded-3xl shadow-2xl p-12">
        <h2 class="heading text-4xl text-center mb-10">Face & Hair</h2>
        <div class="grid md:grid-cols-2 gap-8">
            <div><label>Eyes <span class="text-red-300">*</span></label><select id="eyes" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white"><option value="">Select</option><option>Brown</option><option>Blue</option></select></div>
            <div><label>Hair Style <span class="text-red-300">*</span></label><select id="hair" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white"><option value="">Select</option><option>Long Wavy</option><option>Curly</option></select></div>
        </div>
        <div class="flex justify-between mt-12">
            <button onclick="goToStep(2)" class="px-10 py-4 bg-white/30 rounded-2xl">Back</button>
            <button onclick="validateAndGo(3,4)" class="px-14 py-4 bg-white text-purple-700 font-bold rounded-2xl">Next</button>
        </div>
    </div>

    <div id="step4" class="love-border hidden bg-gradient-to-br from-pink-600 to-rose-600 text-white rounded-3xl shadow-2xl p-12">
        <h2 class="heading text-4xl text-center mb-10">Personality & Intimacy</h2>
        <textarea id="customNote" rows="5" class="w-full p-6 rounded-3xl bg-white/20 border border-white/40 text-white" placeholder="Any special wishes..."></textarea>
        <button onclick="validateAndSubmit()" class="w-full mt-12 py-7 bg-white text-rose-600 text-2xl font-bold rounded-3xl">Manifest My Partner</button>
    </div>

    <div id="result" class="hidden bg-white rounded-3xl shadow-2xl p-12 text-center">
        <h2 class="heading text-5xl text-rose-600">Your Dream Partner is Ready!</h2>
        <div id="summary" class="mt-10 bg-pink-50 p-8 rounded-3xl"></div>
        <button onclick="downloadPDF()" class="mt-10 px-12 py-6 bg-gradient-to-r from-rose-500 to-purple-600 text-white rounded-3xl">Download PDF</button>
    </div>
</div>

<script>
    let userGender = "";

    function selectGender(btn, gender) {
        document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('ring-4', 'ring-white'));
        btn.classList.add('ring-4', 'ring-white');
        userGender = gender;
    }

    function validateStep(step) {
        if (step === 1) {
            if (!document.getElementById('userName').value || 
                !document.getElementById('userEmail').value || 
                !document.getElementById('userAge').value || 
                !userGender) {
                alert("Please fill all required fields!");
                return false;
            }
        }
        if (step === 2) {
            if (!document.getElementById('pAge').value || 
                !document.getElementById('height').value || 
                !document.getElementById('body').value) {
                alert("Please fill all required fields in Physical section!");
                return false;
            }
        }
        if (step === 3) {
            if (!document.getElementById('eyes').value || 
                !document.getElementById('hair').value) {
                alert("Please fill all required fields in Face & Hair section!");
                return false;
            }
        }
        return true;
    }

    function validateAndGo(current, next) {
        if (validateStep(current)) {
            goToStep(next);
        }
    }

    function validateAndSubmit() {
        if (validateStep(4)) {
            submitForm();
        }
    }

    function goToStep(step) {
        document.querySelectorAll('#step1,#step2,#step3,#step4,#result').forEach(el => el.classList.add('hidden'));
        document.getElementById('step' + step).classList.remove('hidden');
    }

    function submitForm() {
        document.getElementById('step4').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        document.getElementById('summary').innerHTML = `
            <h3 class="text-2xl font-bold">Your Dream Partner</h3>
            <p class="mt-4">All your choices have been saved successfully.</p>
        `;
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Dream Partner Profile", 20, 30);
        doc.save("Dream_Partner.pdf");
    }

    window.onload = () => goToStep(1);
</script>
</body>
</html>
