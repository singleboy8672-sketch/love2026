<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartLink • Dream Partner Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@700&family=Inter:wght@400;500;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .heading { font-family: 'Playfair Display', serif; }
        .romantic { font-family: 'Dancing Script', cursive; }

        .rainbow-border {
            border: 16px solid transparent;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(90deg, #e11d48, #c026d3, #db2777, #e11d48) border-box;
            animation: rainbowBorder 4s linear infinite;
        }
        @keyframes rainbowBorder {
            0% { border-image-source: linear-gradient(90deg, #e11d48, #db2777); }
            50% { border-image-source: linear-gradient(90deg, #c026d3, #e11d48); }
            100% { border-image-source: linear-gradient(90deg, #e11d48, #db2777); }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 to-purple-50">

<div class="max-w-4xl mx-auto px-4 py-8">

    <!-- Step 1: Login -->
    <div id="step1" class="rainbow-border bg-white rounded-3xl shadow-2xl p-12">
        <div class="text-center mb-10">
            <h1 class="heading text-6xl text-transparent bg-clip-text bg-gradient-to-r from-rose-500 via-purple-500 to-pink-500">HeartLink</h1>
            <p class="romantic text-4xl text-rose-600 mt-3">Create Your Dream Partner</p>
        </div>

        <div class="max-w-md mx-auto space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">Preferred Language</label>
                <select id="language" class="w-full p-5 border-2 border-pink-200 rounded-2xl focus:border-rose-500">
                    <option value="en" selected>English</option>
                    <option value="bn">বাংলা</option>
                    <option value="hi">हिंदी</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Your Full Name <span class="text-red-500">*</span></label>
                <input id="userName" type="text" oninput="validateLogin()" class="w-full p-5 border-2 border-pink-200 rounded-2xl focus:border-rose-500" placeholder="Enter your name">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Your Email <span class="text-red-500">*</span></label>
                <input id="userEmail" type="email" oninput="validateLogin()" class="w-full p-5 border-2 border-pink-200 rounded-2xl focus:border-rose-500" placeholder="you@example.com">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Your Age <span class="text-red-500">*</span></label>
                <input id="userAge" type="number" min="18" oninput="validateLogin()" class="w-full p-5 border-2 border-pink-200 rounded-2xl focus:border-rose-500" placeholder="Your age">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Your Gender <span class="text-red-500">*</span></label>
                <select id="userGender" onchange="validateLogin()" class="w-full p-5 border-2 border-pink-200 rounded-2xl focus:border-rose-500">
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <button id="next1" onclick="goToStep(2)" disabled 
                    class="w-full py-7 bg-gradient-to-r from-rose-500 to-purple-600 text-white text-2xl font-bold rounded-3xl">
                Continue
            </button>
        </div>
    </div>

    <!-- অন্যান্য স্টেপস (সংক্ষিপ্ত) -->
    <div id="step2" class="love-border hidden bg-gradient-to-br from-rose-700 to-pink-700 text-white rounded-3xl shadow-2xl p-12">
        <h2 class="heading text-4xl text-center mb-10">Physical Attributes</h2>
        <!-- আগের মতো সব অপশন আছে -->
        <div class="flex justify-between mt-12">
            <button onclick="goToStep(1)" class="px-10 py-4 bg-white/30 rounded-2xl">Back</button>
            <button onclick="goToStep(3)" class="px-14 py-4 bg-white text-rose-700 font-bold rounded-2xl">Next</button>
        </div>
    </div>

    <!-- Step 3, Step 4 এবং Result আগের মতো রাখা যেতে পারে -->

    <div id="result" class="hidden bg-white rounded-3xl shadow-2xl p-12 text-center">
        <h2 class="heading text-5xl text-rose-600">Your Dream Partner is Ready!</h2>
        <div id="summary" class="mt-10 bg-pink-50 p-8 rounded-3xl"></div>
        <button onclick="downloadPDF()" class="mt-10 px-12 py-6 bg-gradient-to-r from-rose-500 to-purple-600 text-white rounded-3xl">Download PDF</button>
    </div>
</div>

<script>
    function validateLogin() {
        const name = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        const age = document.getElementById('userAge').value;
        const gender = document.getElementById('userGender').value;

        const isValid = name.length > 1 && email.includes('@') && age && gender;
        document.getElementById('next1').disabled = !isValid;
    }

    function goToStep(step) {
        document.querySelectorAll('#step1,#step2,#step3,#step4,#result').forEach(el => el.classList.add('hidden'));
        document.getElementById('step' + step).classList.remove('hidden');
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Dream Partner Profile", 20, 30);
        doc.save("Dream_Partner.pdf");
    }

    // Initial load
    window.onload = () => {
        // Ensure button is disabled at start
        document.getElementById('next1').disabled = true;
    };
</script>
</body>
</html>
