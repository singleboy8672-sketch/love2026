<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartLink • Dream Partner Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@700&family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .heading { font-family: 'Playfair Display', serif; }
        .romantic { font-family: 'Dancing Script', cursive; }
        .love-border {
            border: 34px solid transparent;
            background: linear-gradient(black, black) padding-box,
                        linear-gradient(45deg, #e11d48, #c026d3, #db2777) border-box;
            animation: borderGlow 3s linear infinite;
        }
        @keyframes borderGlow {
            40%,100% { border-color: #e11d48; }
            70% { border-color: #c026d3; }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 to-purple-50">

<div class="max-w-4xl mx-auto px-4 py-8">

    <!-- Step 1 -->
    <div id="step1" class="love-border rainbow-bg rounded-3xl shadow-2xl p-12 text-white">
        <h1 class="heading text-6xl text-center">HeartLink</h1>
        <p class="romantic text-4xl text-center mt-4">Create Your Dream Partner</p>

        <div class="max-w-lg mx-auto mt-12 space-y-6">
            <select id="language" class="w-full p-4 rounded-2xl bg-white/30 border border-white/50 text-white">
                <option value="en" selected>English</option>
                <option value="bn">বাংলা</option>
                <option value="hi">हिंदी</option>
            </select>

            <input id="userName" type="text" placeholder="Your Full Name *" onkeyup="validateStep1()" class="w-full p-5 rounded-2xl bg-white/90 text-gray-900">
            <input id="userEmail" type="email" placeholder="Your Email *" onkeyup="validateStep1()" class="w-full p-5 rounded-2xl bg-white/90 text-gray-900">
            <input id="userAge" type="number" min="18" placeholder="Your Age *" onkeyup="validateStep1()" class="w-full p-5 rounded-2xl bg-white/90 text-gray-900">

            <select id="userGender" onchange="validateStep1()" class="w-full p-5 rounded-2xl bg-white/90 text-gray-900">
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>

            <button id="next1" onclick="goToStep(2)" disabled class="w-full py-7 bg-white text-rose-600 text-2xl font-bold rounded-3xl">Continue</button>
        </div>
    </div>

    <!-- Step 2: Physical -->
    <div id="step2" class="love-border hidden bg-gradient-to-br from-rose-700 to-pink-700 text-white rounded-3xl shadow-2xl p-12">
        <h2 class="heading text-4xl text-center mb-10">Physical Attributes</h2>
        <div class="grid md:grid-cols-2 gap-8">
            <div><label>Partner Age</label><input id="pAge" type="number" min="18" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white"></div>
            <div><label>Height</label><select id="height" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white"><option value="">Select</option><option>Short</option><option>Average</option><option>Tall</option></select></div>
            <div><label>Body Type</label><select id="body" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white"><option value="">Select</option><option>Slim</option><option>Curvy</option><option>Athletic</option><option>Thick</option></select></div>
            <div><label>Skin Tone</label><select id="skin" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white"><option value="">Select</option><option>Fair</option><option>Medium</option><option>Deep</option></select></div>
        </div>
        <div class="flex justify-between mt-12">
            <button onclick="goToStep(1)" class="px-10 py-4 bg-white/30 rounded-2xl">Back</button>
            <button onclick="goToStep(3)" class="px-14 py-4 bg-white text-rose-700 font-bold rounded-2xl">Next</button>
        </div>
    </div>

    <!-- Step 3: Face & Hair -->
    <div id="step3" class="love-border hidden bg-gradient-to-br from-purple-700 to-violet-700 text-white rounded-3xl shadow-2xl p-12">
        <h2 class="heading text-4xl text-center mb-10">Face & Hair</h2>
        <div class="grid md:grid-cols-2 gap-8">
            <div><label>Eyes</label><select id="eyes" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white"><option value="">Select</option><option>Brown</option><option>Blue</option><option>Green</option></select></div>
            <div><label>Lips</label><select id="lips" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white"><option value="">Select</option><option>Full</option><option>Soft</option></select></div>
            <div><label>Hair Style</label><select id="hair" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white"><option value="">Select</option><option>Long Wavy</option><option>Curly</option><option>Straight</option></select></div>
        </div>
        <div class="flex justify-between mt-12">
            <button onclick="goToStep(2)" class="px-10 py-4 bg-white/30 rounded-2xl">Back</button>
            <button onclick="goToStep(4)" class="px-14 py-4 bg-white text-purple-700 font-bold rounded-2xl">Next</button>
        </div>
    </div>

    <!-- Step 4: Detailed Personality & Intimacy -->
    <div id="step4" class="love-border hidden bg-gradient-to-br from-pink-600 to-rose-600 text-white rounded-3xl shadow-2xl p-12">
        <h2 class="heading text-4xl text-center mb-10">Personality, Love & Intimacy</h2>
        <div class="space-y-8">
            <div>
                <label>Overall Personality</label>
                <select id="personality" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
                    <option value="">Select</option>
                    <option value="Romantic & Caring">Romantic & Caring</option>
                    <option value="Playful & Adventurous">Playful & Adventurous</option>
                    <option value="Calm & Supportive">Calm & Supportive</option>
                    <option value="Passionate & Bold">Passionate & Bold</option>
                </select>
            </div>
            <div>
                <label>Love Language</label>
                <select id="loveLanguage" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
                    <option value="">Select</option>
                    <option value="Physical Touch">Physical Touch</option>
                    <option value="Words of Affirmation">Words of Affirmation</option>
                    <option value="Quality Time">Quality Time</option>
                    <option value="Gifts">Gifts</option>
                </select>
            </div>
            <div>
                <label>Behavior During Intimacy</label>
                <select id="intimacy" class="w-full p-4 rounded-2xl bg-white/20 border border-white/40 text-white">
                    <option value="">Select</option>
                    <option value="Very Affectionate">Very Affectionate & Sensual</option>
                    <option value="Passionate">Passionate & Intense</option>
                    <option value="Gentle">Gentle & Romantic</option>
                    <option value="Wild">Wild & Playful</option>
                    <option value="Attentive">Attentive to Partner's Pleasure</option>
                </select>
            </div>
            <textarea id="customNote" rows="5" class="w-full p-6 rounded-3xl bg-white/20 border border-white/40 text-white" placeholder="Any other special wishes or preferences..."></textarea>
        </div>
        <button onclick="submitForm()" class="w-full mt-12 py-7 bg-white text-rose-600 text-2xl font-bold rounded-3xl">Manifest My Partner</button>
    </div>

    <!-- Result -->
    <div id="result" class="hidden bg-white rounded-3xl shadow-2xl p-12 text-center">
        <h2 class="heading text-5xl text-rose-600">Your Dream Partner is Ready!</h2>
        <div id="summary" class="mt-10 bg-pink-50 p-8 rounded-3xl text-left"></div>
        <button onclick="downloadPDF()" class="mt-10 px-12 py-6 bg-gradient-to-r from-rose-500 to-purple-600 text-white rounded-3xl">Download PDF</button>
    </div>
</div>

<script>
    function validateStep1() {
        const name = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        const age = document.getElementById('userAge').value;
        const gender = document.getElementById('userGender').value;
        document.getElementById('next1').disabled = !(name && email && age && gender);
    }

    function goToStep(step) {
        document.querySelectorAll('#step1,#step2,#step3,#step4,#result').forEach(el => el.classList.add('hidden'));
        document.getElementById('step' + step).classList.remove('hidden');
    }

    function submitForm() {
        document.getElementById('step4').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');

        const partnerType = document.getElementById('userGender').value === 'male' ? 'Girlfriend' : 'Boyfriend';

        document.getElementById('summary').innerHTML = `
            <h3 class="text-2xl font-bold mb-6">Your Dream ${partnerType}</h3>
            <p><strong>Your Name:</strong> ${document.getElementById('userName').value}</p>
            <p><strong>Partner Type:</strong> ${partnerType}</p>
            <p><strong>Personality:</strong> ${document.getElementById('personality').value || 'Not specified'}</p>
            <p><strong>Love Language:</strong> ${document.getElementById('loveLanguage').value || 'Not specified'}</p>
            <p><strong>Intimacy Style:</strong> ${document.getElementById('intimacy').value || 'Not specified'}</p>
            <p class="mt-6 italic">"${document.getElementById('customNote').value || 'A perfect connection built with love 💕'}"</p>
        `;
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Dream Partner Profile", 20, 30);
        doc.save("Dream_Partner.pdf");
    }

    window.onload = () => {
        document.getElementById('next1').disabled = true;
    };
</script>
</body>
</html>
